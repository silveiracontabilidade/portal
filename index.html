<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PLANNUS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__inner">
        <div class="header__branding">
          <img class="branding__logo" src="assets/logo.png" alt="Logo" />
          <div class="branding__text">
            <span class="branding__main">AUTOMAÇÕES E IA</span>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <p class="hero__eyebrow">Central de Ferramentas</p>
      </section>

      <section class="grid">
        <a class="panel" href="http://10.0.0.6:3000/login" data-panel="dp">
          <div class="panel__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 12c2.761 0 5-2.239 5-5S14.761 2 12 2 7 4.239 7 7s2.239 5 5 5zm0 2c-4.418 0-8 2.239-8 5v3h16v-3c0-2.761-3.582-5-8-5z"
              />
            </svg>
          </div>
          <div class="panel__label">
            <span>DP</span>
          </div>
        </a>

        <a class="panel" href="http://10.0.0.6:3001/" data-panel="dashboard-automacoes">
          <div class="panel__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6zm10 0h6v6h-6v-6z"
              />
            </svg>
          </div>
          <div class="panel__label">
            <span>Dashboard Automações</span>
          </div>
        </a>

        <a class="panel" href="http://10.0.0.6:4174/" data-panel="treinamentos">
          <div class="panel__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M4 5h16v2H4V5zm0 4h16v10H4V9zm3 2v2h10v-2H7zm0 4v2h7v-2H7z"
              />
            </svg>
          </div>
          <div class="panel__label">
            <span>Treinamentos</span>
          </div>
        </a>

        <a
          class="panel"
          href="https://solutions.silveiracontabilidade.com.br:8443/silveira/app_Login/"
          data-panel="solutions"
        >
          <div class="panel__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 2l4 4-4 4-4-4 4-4zm-7 8h14v12H5V10zm4 2v2h6v-2H9zm0 4v2h6v-2H9z"
              />
            </svg>
          </div>
          <div class="panel__label">
            <span>Solutions</span>
          </div>
        </a>

        <a class="panel" href="http://10.0.0.17:8000/ferramentas/" data-panel="produtividade">
          <div class="panel__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 2l4 4-4 4-4-4 4-4zm-7 9h14v2H5v-2zm2 4h10v2H7v-2zm2 4h6v2H9v-2z"
              />
            </svg>
          </div>
          <div class="panel__label">
            <span>Produtividade</span>
          </div>
        </a>
      </section>
    </main>
  </body>
</html>
