<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PLANNUS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__inner">
        <div class="header__branding">
          <img class="branding__logo" src="assets/logo.png" alt="Logo" />
          <div class="branding__text">
            <span class="branding__main">PLANNUS</span>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <p class="hero__eyebrow">Central de Painéis</p>
        <h1 class="hero__title">Escolha seu painel</h1>
        <p class="hero__subtitle">
          Acesse rapidamente cada área da PLANNUS.
        </p>
      </section>

      <section class="grid">
        <a class="panel" href="http://10.0.0.7:3000/login" data-panel="dp">
          <div class="panel__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 12c2.761 0 5-2.239 5-5S14.761 2 12 2 7 4.239 7 7s2.239 5 5 5zm0 2c-4.418 0-8 2.239-8 5v3h16v-3c0-2.761-3.582-5-8-5z"
              />
            </svg>
          </div>
          <div class="panel__label">
            <span>DP</span>
          </div>
        </a>

        <a class="panel" href="http://10.0.0.7:4175/login" data-panel="contabil">
          <div class="panel__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm2 4h6v2H9V6zm0 4h6v2H9v-2zm0 4h4v2H9v-2z"
              />
            </svg>
          </div>
          <div class="panel__label">
            <span>CONTÁBIL</span>
          </div>
        </a>

        <a class="panel" href="http://10.0.0.7:4173/login" data-panel="fiscal">
          <div class="panel__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M6 2h12v20l-3-2-3 2-3-2-3 2V2zm2 4h8v2H8V6zm0 4h8v2H8v-2zm0 4h6v2H8v-2z"
              />
            </svg>
          </div>
          <div class="panel__label">
            <span>FISCAL</span>
          </div>
        </a>

        <a class="panel" href="http://10.0.0.7:3006/login" data-panel="comercial">
          <div class="panel__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M3 6h18l-2 12H5L3 6zm4-4h10v2H7V2zm1 6h2v6H8V8zm6 0h2v6h-2V8z"
              />
            </svg>
          </div>
          <div class="panel__label">
            <span>COMERCIAL</span>
          </div>
        </a>

        <a class="panel" href="#" data-panel="consultoria">
          <div class="panel__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 2l4 7-4 2-4-2 4-7zm0 11c3.866 0 7 2.239 7 5v3H5v-3c0-2.761 3.134-5 7-5z"
              />
            </svg>
          </div>
          <div class="panel__label">
            <span>CONSULTORIA</span>
          </div>
        </a>

        <a class="panel" href="#" data-panel="silvia">
          <div class="panel__icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 2l2.2 5.2L20 9l-5 3.6L16.2 18 12 14.8 7.8 18 9 12.6 4 9l5.8-1.8L12 2z"
              />
            </svg>
          </div>
          <div class="panel__label">
            <span>SilvIA</span>
          </div>
        </a>
      </section>
    </main>
  </body>
</html>
